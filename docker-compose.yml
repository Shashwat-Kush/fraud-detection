services:
  # Single-node Kafka in KRaft mode (no Zookeeper needed).
  # The default image config advertises PLAINTEXT://localhost:9092,
  # which is exactly what the host-run producer/consumer use.
  kafka:
    image: apache/kafka:3.9.1
    container_name: fraud-kafka
    ports:
      - "9092:9092"

  # MLflow tracking server + model registry.
  # Mounts the project root so mlflow.db and mlartifacts/ live alongside the code.
  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.14.0
    container_name: fraud-mlflow
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "5000:5000"
    command: mlflow server --backend-store-uri sqlite:///mlflow.db --host 0.0.0.0 --port 5000
