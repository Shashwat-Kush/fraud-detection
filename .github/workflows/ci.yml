name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Only the deps the tests import — the streaming/graph stack
      # (kafka, torch, pyg) is exercised locally, not in CI.
      - name: Install dependencies
        run: |
          pip install pandas scikit-learn pydantic fastapi mlflow-skinny numpy pytest ruff

      - name: Lint
        run: ruff check src serve.py config.py tests

      - name: Test
        run: pytest tests/ -v
